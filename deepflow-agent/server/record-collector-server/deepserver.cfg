# ============================================================
# DeepFlow Record Collector Server Configuration
# ============================================================
# This config is separate from the agent config (deepagent.cfg).
# Pass it at startup: java -jar record-collector-server.jar config=deepserver.cfg

# ============================================================
# server_port — HTTP listen port
# ============================================================
# Port for the Netty HTTP server that receives binary record
# batches from agents via POST /records.
#server_port=8099

# ============================================================
# max_content_length — maximum HTTP request body size
# ============================================================
# Maximum size in bytes of a single POST body. Requests larger
# than this are rejected. Default: 10 MB.
#max_content_length=10485760

# ============================================================
# kafka_bootstrap_servers — Kafka broker addresses
# ============================================================
# Comma-separated list of host:port pairs for the Kafka cluster.
kafka_bootstrap_servers=localhost:9092

# ============================================================
# kafka_topic — Kafka topic for raw trace records
# ============================================================
# Raw binary record batches are published to this topic.
# A downstream consumer reads from this topic, processes the
# records, and writes results to ClickHouse.
kafka_topic=deepflow-records
