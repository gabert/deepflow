# ============================================================
# DeepFlow Record Processor Server Configuration
# ============================================================
# This config is separate from agent (deepagent.cfg) and
# collector server (deepserver.cfg) configs.
# Pass it at startup: java -jar record-processor-server.jar config=deepprocessor.cfg

# ============================================================
# Kafka consumer settings
# ============================================================
kafka_bootstrap_servers=localhost:9092
kafka_topic=deepflow-records
kafka_group_id=deepflow-processor

# ============================================================
# ClickHouse connection settings
# ============================================================
clickhouse_url=http://localhost:8123
clickhouse_database=deepflow
clickhouse_user=deepflow
clickhouse_password=deepflow
