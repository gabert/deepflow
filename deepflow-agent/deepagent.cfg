session_dump_location=D:\temp

destination=file

# Session resolver: selects which SessionIdResolver SPI to use
# Available: config, demo, noop (or any custom name)
# Switch between them by commenting/uncommenting:
session_resolver=config
#session_resolver=demo
session_id=local-debug-01

