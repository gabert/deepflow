# ============================================================
# session_dump_location — where trace output is written
# ============================================================
# Parent directory for the session folder. Each agent run
# creates a subdirectory SESSION-<yyyyMMdd-HHmmss>/ containing
# one .dft file per thread.
session_dump_location=D:\temp

# ============================================================
# destination — output sink type
# ============================================================
# Selects how trace records are delivered.
#
# Available types:
#   file — render to human-readable .dft files (default)
#   http — send raw binary records to a collector server
#destination=file
#destination=http

# ============================================================
# http_server_url — collector server endpoint (for http destination)
# ============================================================
# URL of the record-collector-server's /records endpoint.
# Only relevant when destination=http.
#http_server_url=http://localhost:8099/records

# ============================================================
# http_flush_threshold — batching threshold in bytes
# ============================================================
# Records are buffered and sent in a single HTTP POST when the
# buffer reaches this size. Lower values reduce latency, higher
# values reduce HTTP overhead. Default: 65536 (64 KB).
#http_flush_threshold=65536

# ============================================================
# matchers_include — regex patterns matched against fully
# qualified class names (comma-separated, OR logic).
# ============================================================

# All classes under com.github
matchers_include=com\.github\..*

# --- Scope by package ---
# Single package (non-recursive)
# matchers_include=com\.example\.service\.[^.]+$
# Package and all subpackages
# matchers_include=com\.example\.service\..*
# Multiple packages
# matchers_include=com\.example\.service\..*,com\.example\.repository\..*

# --- Scope by class name ---
# Exact class
# matchers_include=com\.example\.service\.UserService$
# Class and its inner classes
# matchers_include=com\.example\.service\.UserService(\$.*)?$
# Only inner classes of a class
# matchers_include=com\.example\.service\.UserService\$.*

# --- Scope by naming convention ---
# All classes ending with Service
# matchers_include=com\.example\..*Service$
# All classes ending with Controller, Service, or Repository
# matchers_include=com\.example\..*(Controller|Service|Repository)$
# Classes starting with a prefix
# matchers_include=com\.example\..*\.Payment.*

# ============================================================
# matchers_exclude — same syntax, removes classes from include.
# ============================================================
# Exclude a utility package
# matchers_exclude=com\.example\.util\..*
# Exclude generated classes (e.g. Lombok, MapStruct)
# matchers_exclude=.*\$\$.*,.*_Impl$,.*_MapperImpl$
# Exclude test classes
# matchers_exclude=.*Test$,.*TestCase$

# ============================================================
# expand_this — controls how 'this' instance is captured
# ============================================================
# false => TI shows object reference ID only (compact, default)
# true  => TI shows full CBOR-serialized object (verbose)
expand_this=false

# ============================================================
# serialize_values — controls serialization of arguments,
# return values, and exceptions
# ============================================================
# true  => full CBOR serialization of method args, return
#          values, this instance, and exception details (default)
# false => skip serialization entirely, record only method
#          signatures, call depth, and timestamps.
#          Use this for dead code detection where you only need
#          to know which methods were called, not what data
#          was passed. Significantly reduces processing overhead.
serialize_values=true

# ============================================================
# emit_tags — controls which trace record tags are emitted
# ============================================================
# Comma-separated list of tags. MS (method signature) is always
# emitted regardless of this setting. Tags control both what
# data the agent captures (expensive serialization is skipped
# for disabled tags) and what lines appear in .dft output.
#
# Available tags:
#   SI — session ID
#   TN — thread name
#   CI — call ID (unique per method invocation)
#   PI — parent call ID (-1 for root calls)
#   TS — timestamp (entry)
#   CL — caller line number
#   TI — this instance (object ref or full CBOR)
#   AR — arguments at method entry
#   RT — return type (VOID / VALUE / EXCEPTION)
#   RE — return/exception value
#   TE — timestamp (exit)
#   AX — arguments at method exit (for mutation detection)
#
# Default (no AX):
# emit_tags=SI,TN,CI,PI,TS,CL,TI,AR,RT,RE,TE
#
# Mutation detection mode (add AX to see args before and after):
# emit_tags=SI,TN,CI,PI,TS,CL,TI,AR,RT,RE,TE,AX
#
# Minimal structural trace (no values, just call tree):
# emit_tags=TN,CI,PI,TS,CL,TE

# ============================================================
# session_resolver — selects which SessionIdResolver SPI to use
# ============================================================
# Pluggable session ID resolution via Java ServiceLoader.
# The resolver is loaded lazily on first method entry, so
# framework classloaders (e.g. Spring Boot) are fully ready.
# Multiple resolver JARs can be on the classpath; only the one
# matching this name is activated. Comment out to disable
# (default: no session tracking).
#
# Available resolvers:
#   config         — reads session_id (below) from agent config
#   spring-session — reads HTTP session ID from ThreadLocal
#                    (set by SessionIdFilter in Spring Boot apps)
#
# See spi/session-resolver-api/SESSION-RESOLVER-SPI.md for details.
session_resolver=config
#session_resolver=spring-session


# ============================================================
# session_id — custom session ID (used by "config" resolver)
# ============================================================
# Published as system property deepflow.session_id at startup.
# Only relevant when session_resolver=config.
session_id=local-debug-01

# ============================================================
# jpa_proxy_resolver — selects which JpaProxyResolver SPI to use
# ============================================================
# When set, JPA framework proxies (Hibernate lazy-loading proxies,
# collection wrappers like PersistentBag/PersistentSet) are
# unwrapped to their real objects before serialization. Without
# this, proxies appear as <proxy> in trace output.
# Loaded lazily, uses reflection (no compile-time Hibernate dep).
#
# Available resolvers:
#   hibernate — unwraps Hibernate entity proxies and collection
#               wrappers via reflection
#
# See jpa-proxy-resolver-api/JPA-PROXY-RESOLVER-SPI.md for details.
jpa_proxy_resolver=hibernate